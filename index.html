<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.wrap{max-width:540px;margin:0 auto;min-height:100vh;background:#f5f5f3}
.pad{padding:1rem}
.lbl{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.06em;margin:1.25rem 0 6px}
.lbl.t0{margin-top:0}
.req{color:#A32D2D}
.card{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:12px;padding:1rem;margin-bottom:10px}
.field{margin-bottom:10px}.field:last-child{margin-bottom:0}
.field label{font-size:13px;color:#888;display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;font-size:15px;padding:9px 10px;border:0.5px solid rgba(0,0,0,.2);border-radius:8px;background:#fff;color:#111}
.field textarea{min-height:60px;resize:vertical}
.field input.err{border-color:#A32D2D;background:#fff8f8}
.ferr{font-size:12px;color:#A32D2D;margin-top:3px}
.btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;display:block;margin-top:6px}
.btn-p{background:#534AB7;color:#fff}.btn-d{background:#A32D2D;color:#fff}
.btn-o{background:#fff;color:#111;border:0.5px solid rgba(0,0,0,.2)}
.btn-g{background:#1D9E75;color:#fff}.btn-wa{background:#25D366;color:#fff}
.sel-btn{width:100%;padding:9px 10px;border:0.5px solid rgba(0,0,0,.2);border-radius:8px;background:#fff;color:#111;font-size:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;text-align:left}
.sel-btn .ph{color:#888}
.dp{background:#fff;border:0.5px solid rgba(0,0,0,.2);border-radius:12px;margin-top:4px;overflow:hidden;display:none;position:relative;z-index:30}
.dp.open{display:block}
.dp input{width:100%;padding:9px 10px;border:none;border-bottom:0.5px solid rgba(0,0,0,.1);font-size:14px;background:#f5f5f3;color:#111}
.dp-list{max-height:170px;overflow-y:auto}
.dpi{padding:9px 12px;font-size:14px;cursor:pointer;color:#111;border-bottom:0.5px solid rgba(0,0,0,.07)}
.dpi:last-child{border-bottom:none}.dpi:hover{background:#f5f5f3}
.dpi .sub{font-size:11px;color:#888;margin-top:1px}
.dp-mt{padding:1rem;text-align:center;color:#888;font-size:13px}
.fuel-g{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.fb{padding:9px 4px;border:0.5px solid rgba(0,0,0,.2);border-radius:8px;background:#fff;cursor:pointer;text-align:center;font-size:12px;font-weight:500;color:#111}
.fb.sel{background:#EEEDFE;border-color:#534AB7;color:#3C3489}
.vsg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:6px}
.vsb{padding:13px 6px;border:0.5px solid rgba(0,0,0,.2);border-radius:10px;background:#fff;cursor:pointer;text-align:center}
.vsb.sel{border-color:#534AB7;background:#EEEDFE}.vsb.done{opacity:.4;pointer-events:none}
.vsb .vn{font-size:19px;font-weight:500}.vsb.sel .vn{color:#3C3489}
.vsb .vh{font-size:11px;color:#888;margin-top:2px}
.stags{display:flex;flex-wrap:wrap;gap:5px;min-height:30px;margin-bottom:8px}
.stag{padding:4px 9px;background:#EEEDFE;border-radius:20px;font-size:12px;color:#3C3489;display:inline-flex;align-items:center;gap:3px}
.stag button{background:none;border:none;color:#534AB7;font-size:14px;cursor:pointer;padding:0;line-height:1}
.rrow{display:flex;gap:8px;margin-top:4px}
.ropt{flex:1;padding:9px;border:0.5px solid rgba(0,0,0,.2);border-radius:8px;background:#fff;cursor:pointer;font-size:13px;text-align:center;color:#888}
.ropt.yes{background:#EAF3DE;border-color:#3B6D11;color:#27500A}.ropt.no{background:#f5f5f3;color:#111}
.pzone{border:0.5px dashed rgba(0,0,0,.2);border-radius:8px;padding:11px;text-align:center;cursor:pointer;margin-top:8px;background:#f5f5f3}
.pzone p{font-size:13px;color:#888}
.pprev{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}
.pthumb{width:64px;height:64px;border-radius:8px;object-fit:cover;border:0.5px solid rgba(0,0,0,.1)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.bv1{background:#E1F5EE;color:#085041}.bv2{background:#E6F1FB;color:#0C447C}.bv3{background:#FAEEDA;color:#633806}
.bdmg{background:#FCEBEB;color:#791F1F}.bok{background:#EAF3DE;color:#27500A}.bact{background:#EEEDFE;color:#3C3489}.bwrn{background:#FAEEDA;color:#633806}
.sbar{display:flex;gap:6px;margin-bottom:1rem}
.step{flex:1;height:3px;border-radius:2px;background:rgba(0,0,0,.1)}.step.d{background:#534AB7}.step.c{background:#AFA9EC}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 1rem;background:#fff;border-bottom:0.5px solid rgba(0,0,0,.1);position:sticky;top:0;z-index:20}
.hdr-left{display:flex;align-items:center;gap:8px}
.hdr-logo{width:28px;height:28px;border-radius:7px;overflow:hidden;flex-shrink:0}
.hdr-logo img{width:100%;height:100%;object-fit:cover}
.hdr-n{font-size:13px;font-weight:500}.hdr-r{font-size:11px;color:#888}
.log-btn{font-size:12px;padding:5px 10px;border:0.5px solid rgba(0,0,0,.2);border-radius:6px;background:none;cursor:pointer;color:#888}
.tab-bar{display:flex;background:#fff;border-bottom:0.5px solid rgba(0,0,0,.1)}
.tb{flex:1;padding:10px 4px;font-size:12px;font-weight:500;border:none;background:none;cursor:pointer;color:#888;border-bottom:2px solid transparent;white-space:nowrap}
.tb.active{color:#534AB7;border-bottom:2px solid #534AB7}
.view{display:none}.view.active{display:block}
.pin-dots{display:flex;justify-content:center;gap:10px;margin:14px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid #534AB7;background:transparent}
.pin-dot.f{background:#534AB7}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:220px;margin:0 auto 8px}
.pk{padding:15px;border:0.5px solid rgba(0,0,0,.2);border-radius:10px;background:#fff;font-size:20px;font-weight:500;cursor:pointer;text-align:center}
.pk:active{background:#f0f0f0}.pk.delk{font-size:15px;color:#A32D2D}
.pin-err{color:#A32D2D;font-size:13px;text-align:center;min-height:18px;margin:4px 0}
.day-hdr{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:12px;padding:1rem;margin-bottom:10px}
.day-pat{font-size:20px;font-weight:500}.day-meta{font-size:13px;color:#888;margin-top:2px}
.day-km{font-size:12px;color:#888;margin-top:8px;padding-top:8px;border-top:0.5px solid rgba(0,0,0,.08)}
.vc{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:12px;padding:12px;margin-bottom:8px}
.vc-t{font-size:14px;font-weight:500}.vc-m{font-size:11px;color:#888;margin-top:2px}
.vc-bg{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;align-items:center}
.act-btn{padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;white-space:nowrap}
.btn-edit{border:0.5px solid #534AB7;background:none;color:#534AB7}
.btn-del-v{border:0.5px solid #A32D2D;background:none;color:#A32D2D}
.del-confirm{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
.del-confirm span{font-size:12px;color:#A32D2D}
.del-yes{padding:4px 10px;background:#A32D2D;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer}
.del-no{padding:4px 10px;background:none;border:0.5px solid rgba(0,0,0,.2);border-radius:6px;font-size:12px;cursor:pointer}
.empty-d{text-align:center;padding:1.25rem;color:#888;font-size:13px;background:#f5f5f3;border-radius:8px;margin-bottom:10px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem}
.sc{background:#f5f5f3;border-radius:8px;padding:12px;text-align:center}
.sc .sv{font-size:22px;font-weight:500}.sc .sl{font-size:11px;color:#888;margin-top:2px}
.fr{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.fr select{font-size:13px;padding:6px 8px;border:0.5px solid rgba(0,0,0,.18);border-radius:8px;background:#fff;color:#111;flex:1;min-width:100px}
.tc{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:12px;overflow:hidden;margin-bottom:10px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:680px}
th{background:#f5f5f3;padding:7px 9px;text-align:left;font-weight:500;font-size:11px;color:#888;border-bottom:0.5px solid rgba(0,0,0,.08);white-space:nowrap}
td{padding:7px 9px;border-bottom:0.5px solid rgba(0,0,0,.06);color:#111;white-space:nowrap;font-size:12px}
tr:last-child td{border-bottom:none}
.exp-btn{padding:6px 12px;border:0.5px solid rgba(0,0,0,.18);border-radius:8px;background:#fff;color:#111;font-size:12px;cursor:pointer}
.empty-msg{padding:2rem;text-align:center;color:#888;font-size:13px}
.inc-detail{font-size:12px;padding:8px 10px;background:#FFF8EE;border-radius:8px;margin:3px 0;word-break:break-word;white-space:normal}
.inc-detail .il{font-weight:500;color:#888;font-size:11px;display:block;margin-bottom:2px}
.adm-r{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.adm-r input,.adm-r select{flex:1;font-size:14px;padding:8px 10px;border:0.5px solid rgba(0,0,0,.2);border-radius:8px;background:#fff;color:#111}
.add-btn{padding:8px 14px;background:#534AB7;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap}
.il-list{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:12px;overflow:hidden;margin-bottom:10px}
.ir{display:flex;align-items:flex-start;justify-content:space-between;padding:9px 12px;border-bottom:0.5px solid rgba(0,0,0,.06);font-size:13px}
.ir:last-child{border-bottom:none}.ir-sub{font-size:11px;color:#888;margin-top:2px}
.del-btn{color:#A32D2D;font-size:12px;padding:3px 8px;border:0.5px solid #F09595;border-radius:6px;background:none;cursor:pointer;white-space:nowrap;flex-shrink:0}
.ub{border:0.5px dashed rgba(0,0,0,.18);border-radius:10px;padding:11px;text-align:center;background:#f5f5f3;cursor:pointer;margin-bottom:6px}
.ub p{font-size:12px;color:#888;margin-bottom:5px}
.tpl-btn{font-size:12px;padding:4px 10px;border:0.5px solid rgba(0,0,0,.18);border-radius:6px;background:#fff;color:#111;cursor:pointer;display:inline-block}
.ur{font-size:12px;padding:7px 10px;border-radius:8px;margin-top:4px;margin-bottom:6px;display:none}
.ur.ok{background:#EAF3DE;color:#27500A;display:block}.ur.err{background:#FCEBEB;color:#791F1F;display:block}
.perm-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px}
.perm-cb{display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer}
.perm-cb input{width:16px;height:16px;accent-color:#534AB7}
.adm-sec{margin-bottom:1.5rem}
.rr{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:0.5px solid rgba(0,0,0,.07)}
.rr:last-child{border-bottom:none}
.fixed-val{padding:9px 10px;border:0.5px solid rgba(0,0,0,.1);border-radius:8px;font-size:14px;background:#f5f5f3}
.pwa-banner{background:#EEEDFE;border:0.5px solid #534AB7;border-radius:12px;padding:12px 1rem;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.pwa-banner p{font-size:13px;color:#3C3489;flex:1}
.pwa-add{padding:7px 14px;background:#534AB7;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap}
.pwa-close{background:none;border:none;color:#534AB7;font-size:18px;cursor:pointer;padding:0 4px;flex-shrink:0}
.res-card{background:#fff;border-radius:14px;padding:1.25rem;margin-bottom:12px;border:0.5px solid rgba(0,0,0,.08)}
.res-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(83,74,183,.15)}
.res-logo{width:40px;height:40px;border-radius:10px;overflow:hidden;flex-shrink:0}
.res-logo img{width:100%;height:100%;object-fit:cover}
.res-title{font-size:15px;font-weight:500;color:#111}
.res-sub{font-size:12px;color:#888;margin-top:2px}
.res-section{margin-bottom:12px}
.res-section-title{font-size:10px;font-weight:500;color:#534AB7;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.res-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:0.5px solid rgba(0,0,0,.05)}
.res-row:last-child{border-bottom:none}
.res-lbl{color:#888}.res-val{color:#111;font-weight:500;text-align:right;max-width:60%}
.res-inc-block{background:#FFF3F3;border-radius:6px;padding:8px 10px;margin-top:6px}
.res-inc-lbl{font-size:10px;font-weight:500;color:#A32D2D;margin-bottom:2px}
.res-inc-val{font-size:12px;color:#333}
.res-vuelta{background:#f8f7ff;border-radius:8px;padding:10px;margin-bottom:6px}
.res-v-title{font-size:12px;font-weight:500;color:#534AB7;margin-bottom:6px}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
.loading-overlay p{font-size:14px;color:#534AB7;font-weight:500}
.spin{width:32px;height:32px;border:3px solid #EEEDFE;border-top-color:#534AB7;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(min-width:600px){.wrap{border-left:0.5px solid rgba(0,0,0,.08);border-right:0.5px solid rgba(0,0,0,.08)}}
@media(min-width:1024px){body{background:#eeeee8;padding:2rem 0}.wrap{max-width:540px;border-radius:16px;overflow:hidden;box-shadow:0 0 0 0.5px rgba(0,0,0,.1);min-height:auto}}
</style>
</head>

function dbS(){try{localStorage.setItem('sc13c',JSON.stringify(DB));}catch(e){}}

function toISO(){var d=new Date();var m=d.getMonth()+1;var dd=d.getDate();return d.getFullYear()+'-'+(m<10?'0':'')+m+'-'+(dd<10?'0':'')+dd;}
function fmt(iso){if(!iso)return '';var p=iso.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:iso;}
function nowT(){return new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});}
function nowF(){return new Date().toLocaleString('es-CL',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function toMins(t){if(!t)return -1;var p=t.split(':');return parseInt(p[0])*60+parseInt(p[1]);}
function actJ(){return DB.jornadas.find(function(j){return j.estado==='activo';})||null;}
function allU(){return [MASTER].concat(DB.usuarios);}
function getConds(){return DB.usuarios.filter(function(u){return u.rol==='conductor';});}
function getAyus(){return DB.usuarios.filter(function(u){return u.rol==='ayudante';});}
function parseSucs(s){if(!s)return [];return s.split(', ').map(function(x){var n=parseInt(x.replace('Suc.',''));return DB.sucursales.find(function(y){return y.n===n;})||{n:n,addr:x};}).filter(Boolean);}
function prevVuelta(j,num){var p=null;j.vueltas.forEach(function(v){if(v.num<num&&(!p||v.num>p.num))p=v;});return p;}
function lastVuelta(j){var p=null;j.vueltas.forEach(function(v){if(!p||v.num>p.num)p=v;});return p;}
function askDel(row,fn){var ex=row.querySelector('.del-confirm');if(ex){ex.remove();return;}var db=row.querySelector('.del-btn,.btn-del-v');if(db)db.style.display='none';var div=document.createElement('div');div.className='del-confirm';div.innerHTML='<span>¿Eliminar?</span><button class="del-yes">Sí</button><button class="del-no">Cancelar</button>';div.querySelector('.del-yes').onclick=function(){fn();};div.querySelector('.del-no').onclick=function(){div.remove();if(db)db.style.display='';};row.appendChild(div);}
function openDrop(id){if(ODK&&ODK!==id){var p=document.getElementById('dp-'+ODK);if(p)p.classList.remove('open');}var el=document.getElementById('dp-'+id);if(!el)return;var was=el.classList.contains('open');el.classList.toggle('open',!was);ODK=was?null:id;if(!was){var s=el.querySelector('input');if(s){s.value='';fillDrop(id,'');}}}
document.addEventListener('click',function(e){if(!e.target.closest('.dp')&&!e.target.closest('.sel-btn')){document.querySelectorAll('.dp.open').forEach(function(p){p.classList.remove('open');});ODK=null;}});
function fillUsrDP(q){var el=document.getElementById('dpl-usr');if(!el)return;var items=allU().filter(function(u){return u.nombre.toLowerCase().indexOf(q.toLowerCase())>=0;});el.innerHTML=items.length?items.map(function(u){return '<div class="dpi" onclick="selUsr(''+u.id+'')">'+u.nombre+'<div class="sub">'+u.rol+'</div></div>';}).join(''):'<div class="dp-mt">Sin resultados</div>';}
function fillDrop(id,q){var el=document.getElementById('dpl-'+id);if(!el)return;var items=[];if(id==='pat'||id==='j-pat')items=DB.patentes.filter(function(p){return p.toLowerCase().indexOf(q.toLowerCase())>=0;});if(id==='cond'||id==='j-cond')items=getConds().filter(function(u){return u.nombre.toLowerCase().indexOf(q.toLowerCase())>=0;});if(id==='ayu'||id==='j-ayu')items=getAyus().filter(function(u){return u.nombre.toLowerCase().indexOf(q.toLowerCase())>=0;});if(id==='ayu2'){var j=actJ();var ex=j?j.ayu:'';items=getAyus().filter(function(u){return u.nombre!==ex&&u.nombre.toLowerCase().indexOf(q.toLowerCase())>=0;});}if(id==='suc')items=DB.sucursales.filter(function(s){return String(s.n).indexOf(q)>=0||s.addr.toLowerCase().indexOf(q.toLowerCase())>=0;});if(!items.length){el.innerHTML='<div class="dp-mt">Sin resultados</div>';return;}if(id==='suc'){el.innerHTML=items.map(function(s){return '<div class="dpi" onclick="addSucTag('+s.n+')"><div>Sucursal '+s.n+'</div><div class="sub">'+s.addr+'</div></div>';}).join('');}else{el.innerHTML=items.map(function(v){var nm=v.nombre||v;var safe=nm.replace(/'/g,"&#39;");return '<div class="dpi" onclick="selDP(''+id+'',''+safe+'')">'+nm+'</div>';}).join('');}}
function selUsr(id){loginUsr=allU().find(function(u){return u.id===id;});if(!loginUsr)return;var lbl=document.getElementById('lbl-usr');lbl.textContent=loginUsr.nombre;lbl.classList.remove('ph');document.getElementById('dp-usr').classList.remove('open');ODK=null;pinBuf='';updDots();document.getElementById('pin-err').textContent='';document.getElementById('pin-sec').style.display='block';}
function selDP(id,val){if(id==='pat'||id==='j-pat')iniSt.pat=val;if(id==='ayu2')vSt.ayu2=val;var lbl=document.getElementById('lbl-'+id);if(lbl){lbl.textContent=val;lbl.classList.remove('ph');}var dp=document.getElementById('dp-'+id);if(dp)dp.classList.remove('open');ODK=null;}
function addSucTag(n){var s=DB.sucursales.find(function(x){return x.n===n;});if(!s||vSt.sucs.find(function(x){return x.n===n;}))return;vSt.sucs.push(s);var dp=document.getElementById('dp-suc');if(dp)dp.classList.remove('open');ODK=null;renderSucTags();}
function removeSucTag(n){vSt.sucs=vSt.sucs.filter(function(s){return s.n!==n;});renderSucTags();}

function pk(k){if(pinBuf.length>=4)return;pinBuf+=k;updDots();if(pinBuf.length===4)setTimeout(doLogin,120);}

function doCP(){var p1=document.getElementById('cp1').value.trim(),p2=document.getElementById('cp2').value.trim();if(!/^\d{4}$/.test(p1)){document.getElementById('cp-err').textContent='El PIN debe ser exactamente 4 dígitos.';return;}if(p1!==p2){document.getElementById('cp-err').textContent='Los PINs no coinciden.';return;}var u=DB.usuarios.find(function(x){return x.id===SES.u.id;});if(u){u.pin=p1;u.mustChangePIN=false;dbS();}SES.u.pin=p1;SES.u.mustChangePIN=false;document.getElementById('s-chpin').style.display='none';startSess(SES.u);}
function startSess(u){SES.u=u;document.getElementById('s-login').style.display='none';document.getElementById('s-chpin').style.display='none';document.getElementById('s-app').style.display='block';document.getElementById('hdr-n').textContent=u.nombre;document.getElementById('hdr-r').textContent=u.rol;var perms=u.permisos||[];document.getElementById('tab-bar').innerHTML=(perms.indexOf('jornada')>=0?'<button class="tb active" onclick="goTab('jornada')">Jornada</button>':'')+(perms.indexOf('registros')>=0?'<button class="tb" onclick="goTab('panel')">Registros</button>':'')+(perms.indexOf('admin')>=0?'<button class="tb" onclick="goTab('admin')">Administrar</button>':'');document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});var first=perms[0]||'jornada';var fv=document.getElementById('v-'+first);if(fv)fv.classList.add('active');if(first==='jornada')renderJ();else if(first==='panel')renderPanel();else if(first==='admin')renderAdmin();}

function goTab(t){document.querySelectorAll('.tb').forEach(function(b){var m={jornada:'Jornada',panel:'Registros',admin:'Administrar'};b.classList.toggle('active',b.textContent.trim()===m[t]);});document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});var el=document.getElementById('v-'+t);if(el)el.classList.add('active');if(t==='jornada')renderJ();else if(t==='panel')renderPanel();else if(t==='admin')renderAdmin();}
function renderJ(){var j=actJ();if(!j)renderIni();else renderActivo(j);}
function fuelH(ctx,sel){sel=sel!=null?sel:-1;return '<div class="fuel-g" id="fg-'+ctx+'">'+FUELS.map(function(f,i){return '<div class="fb'+(i===sel?' sel':'')+'" onclick="selFuel(''+ctx+'','+i+')">'+f+'</div>';}).join('')+'</div>';}
function selFuel(ctx,i){var el=document.getElementById('fg-'+ctx);if(!el)return;el.querySelectorAll('.fb').forEach(function(b,j){b.classList.toggle('sel',j===i);});if(ctx==='ini')iniSt.fuelIdx=i;else if(ctx==='fin')finSt.fuelIdx=i;}
function dpW(id,ph,val){var d=val||ph,hp=!val;return '<div style="position:relative;margin-bottom:0"><button class="sel-btn" onclick="openDrop(''+id+'')"><span id="lbl-'+id+'"'+(hp?' class="ph"':'')+'>'+d+'</span><span style="font-size:11px;color:#888">▼</span></button><div id="dp-'+id+'" class="dp"><input placeholder="Buscar..." oninput="fillDrop(''+id+'',this.value)"><div id="dpl-'+id+'" class="dp-list"></div></div></div>';}
function renderIni(){iniSt={pat:'',fuelIdx:-1};editV=0;var u=SES.u,isC=u.rol==='conductor',isA=u.rol==='ayudante';document.getElementById('v-jornada').innerHTML='<div class="pad"><div id="pwa-banner" class="pwa-banner" style="display:none"><p>Agrega esta app a tu pantalla de inicio</p><button class="pwa-add" onclick="pwaInstall()">Agregar</button><button class="pwa-close" onclick="this.closest('.pwa-banner').style.display='none'">×</button></div><div class="sbar"><div class="step c"></div><div class="step"></div><div class="step"></div></div><div style="font-size:16px;font-weight:500;margin-bottom:.25rem">Inicio de jornada</div><div style="font-size:13px;color:#888;margin-bottom:1rem">Completa los datos para iniciar</div><div class="lbl t0">Fecha y vehículo</div><div class="card"><div class="field"><label>Fecha <span class="req">*</span></label><input id="i-fecha" type="date" value="'+toISO()+'"></div><div class="field"><label>Patente <span class="req">*</span></label>'+dpW('pat','Seleccionar patente...')+'</div><div class="field"><label>Km inicial <span class="req">*</span></label><input id="i-km" type="number" placeholder="Ej: 45230" inputmode="numeric"></div><div class="field"><label>Combustible al inicio <span class="req">*</span></label>'+fuelH('ini')+'</div></div><div class="lbl">Tripulación <span style="font-size:10px;color:#A32D2D;font-weight:400;text-transform:none;letter-spacing:0">Ambos campos son obligatorios</span></div><div class="card"><div class="field"><label>Conductor <span class="req">*</span></label>'+(isC?'<div class="fixed-val">'+u.nombre+'</div>':dpW('cond','Seleccionar conductor...'))+'</div><div class="field"><label>Ayudante <span class="req">*</span></label>'+(isA?'<div class="fixed-val">'+u.nombre+'</div>':dpW('ayu','Seleccionar ayudante...'))+'</div></div><button class="btn btn-p" onclick="iniciarJ()">Iniciar jornada</button><div style="height:1.5rem"></div></div>';if(deferredPrompt){var b=document.getElementById('pwa-banner');if(b)b.style.display='flex';}}

function renderResumenJornada(j){var inc=j.vueltas.filter(function(v){return v.ds==='si'||v.de==='si'||v.rc==='si';});var kmTotal=tempCierre.kmFin>j.kmIni?tempCierre.kmFin-j.kmIni:0;var vueltasHTML=j.vueltas.slice().sort(function(a,b){return a.num-b.num;}).map(function(v){var bc=['','#1D9E75','#185FA5','#854F0B'][v.num]||'#534AB7';var incH='';if(v.ds==='si')incH+='<div class="res-inc-block"><div class="res-inc-lbl">Daño al recibir</div><div class="res-inc-val">'+v.dscmt+'</div></div>';if(v.de==='si')incH+='<div class="res-inc-block"><div class="res-inc-lbl">Daño en entrega</div><div class="res-inc-val">'+v.decmt+'</div></div>';if(v.rc==='si')incH+='<div class="res-inc-block"><div class="res-inc-lbl">Reclamo</div><div class="res-inc-val">'+v.rccmt+'</div></div>';return '<div class="res-vuelta"><div class="res-v-title" style="color:'+bc+'">'+v.num+'ª vuelta · '+(v.hsal||'--')+' – '+(v.hllg||'--')+'</div><div class="res-row"><span class="res-lbl">Sucursales</span><span class="res-val">'+v.sucs+'</span></div><div class="res-row"><span class="res-lbl">Ayudante jornada</span><span class="res-val">'+j.ayu+'</span></div>'+(v.ayu2?'<div class="res-row"><span class="res-lbl">Ayudante 2</span><span class="res-val">'+v.ayu2+'</span></div>':'')+'<div class="res-row"><span class="res-lbl">Km salida → llegada</span><span class="res-val">'+(v.kmsal||'—')+' → '+(v.kmllg||'—')+'</span></div>'+(incH||'<div style="font-size:11px;color:#27500A;margin-top:4px">Sin incidencias</div>')+'</div>';}).join('');document.getElementById('v-jornada').innerHTML='<div class="pad"><div class="sbar"><div class="step d"></div><div class="step d"></div><div class="step d"></div></div><div style="font-size:16px;font-weight:500;margin-bottom:.25rem">Resumen de jornada</div><div style="font-size:13px;color:#888;margin-bottom:1rem">Revisa antes de guardar</div><div id="res-card" class="res-card"><div class="res-header"><div class="res-logo"><img src="'+LOGO_SM+'" style="width:40px;height:40px;object-fit:cover;border-radius:10px"></div><div><div class="res-title">Jornada San Camilo</div><div class="res-sub">'+j.fecha+' · '+nowF()+'</div></div></div><div class="res-section"><div class="res-section-title">Vehículo y tripulación</div><div class="res-row"><span class="res-lbl">Patente</span><span class="res-val">'+j.pat+'</span></div><div class="res-row"><span class="res-lbl">Conductor</span><span class="res-val">'+j.cond+'</span></div><div class="res-row"><span class="res-lbl">Ayudante</span><span class="res-val">'+j.ayu+'</span></div><div class="res-row"><span class="res-lbl">Hora inicio → fin</span><span class="res-val">'+j.horaIni+' – '+nowT()+'</span></div><div class="res-row"><span class="res-lbl">Km inicio → fin</span><span class="res-val">'+j.kmIni.toLocaleString('es-CL')+' → '+tempCierre.kmFin.toLocaleString('es-CL')+'</span></div><div class="res-row"><span class="res-lbl">Km recorridos</span><span class="res-val">'+kmTotal.toLocaleString('es-CL')+' km</span></div><div class="res-row"><span class="res-lbl">Combustible ini → fin</span><span class="res-val">'+j.fuelIni+' → '+FUELS[tempCierre.fuelIdx]+'</span></div>'+(tempCierre.obs?'<div class="res-row"><span class="res-lbl">Obs. cierre</span><span class="res-val">'+tempCierre.obs+'</span></div>':'')+'</div><div class="res-section"><div class="res-section-title">'+j.vueltas.length+' vuelta(s) · '+inc.length+' incidencia(s)</div>'+vueltasHTML+'</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px"><button class="btn btn-wa" style="margin-top:0" onclick="compartirCard('res-card','jornada_san_camilo.png','Jornada San Camilo')">📤 Compartir</button><button class="btn btn-o" style="margin-top:0" onclick="renderFin()">← Volver</button></div><button class="btn btn-g" onclick="confirmarGuardar()">Guardar jornada</button><div style="height:1.5rem"></div></div>';}
function compartirCard(cardId,filename,title){var el=document.getElementById(cardId);if(!el)return;function doCapture(){var ov=document.createElement('div');ov.className='loading-overlay';ov.innerHTML='<div class="spin"></div><p>Generando imagen...</p>';document.body.appendChild(ov);html2canvas(el,{backgroundColor:'#ffffff',scale:2,useCORS:true,logging:false}).then(function(canvas){document.body.removeChild(ov);canvas.toBlob(function(blob){var file=new File([blob],filename,{type:'image/png'});if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){navigator.share({files:[file],title:title}).catch(function(){});}else{var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=filename;a.click();setTimeout(function(){window.open('https://wa.me/','_blank');},800);}},'image/png');}).catch(function(){document.body.removeChild(ov);alert('No se pudo generar la imagen. Toma una captura manual.');});}if(typeof html2canvas==='undefined'){var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';s.onload=doCapture;s.onerror=function(){alert('Error al cargar librería.');};document.head.appendChild(s);}else{doCapture();}}
function confirmarGuardar(){var j=actJ();if(!j)return;j.kmFin=tempCierre.kmFin;j.fuelFin=FUELS[tempCierre.fuelIdx];j.horaFin=nowT();j.kmTotal=tempCierre.kmFin>j.kmIni?tempCierre.kmFin-j.kmIni:0;j.obsCierre=tempCierre.obs;j.estado='cerrado';j.closedAt=nowF();tempCierre={kmFin:0,fuelIdx:-1,obs:''};dbS();renderIni();}
function renderPanel(){document.getElementById('v-panel').innerHTML='<div class="pad"><div class="sg"><div class="sc"><div class="sv" id="st-h">0</div><div class="sl">Vueltas hoy</div></div><div class="sc"><div class="sv" id="st-i">0</div><div class="sl">Con incidencias</div></div></div><div class="fr"><select id="fp-p" onchange="renderTbl()"><option value="">Todas las patentes</option></select><select id="fp-v" onchange="renderTbl()"><option value="">Todas las vueltas</option><option value="1">1ª</option><option value="2">2ª</option><option value="3">3ª</option></select><button class="exp-btn" onclick="expCSV()">CSV</button></div><div class="tc"><div class="tw"><table><thead><tr><th>Fecha</th><th>Patente</th><th>Conductor</th><th>Ay.Jornada</th><th>Vuelta</th><th>Sucursales</th><th>Ay.2</th><th>H.sal</th><th>H.llg</th><th>Km rec.</th><th>D.Sal</th><th>D.Ent</th><th>Recl.</th><th></th></tr></thead><tbody id="tbl-body"></tbody></table></div><div id="tbl-empty" class="empty-msg">Sin registros aún.</div></div><div style="height:1rem"></div></div>';updStats();renderTbl();}
function updStats(){var hoy=fmt(toISO()),hv=[];DB.jornadas.forEach(function(j){if(j.fecha===hoy)j.vueltas.forEach(function(v){hv.push(v);});});var sh=document.getElementById('st-h'),si=document.getElementById('st-i');if(sh)sh.textContent=hv.length;if(si)si.textContent=hv.filter(function(v){return v.ds==='si'||v.de==='si'||v.rc==='si';}).length;var pats=[];DB.jornadas.forEach(function(j){if(pats.indexOf(j.pat)<0)pats.push(j.pat);});var fp=document.getElementById('fp-p');if(!fp)return;var cv=fp.value;fp.innerHTML='<option value="">Todas las patentes</option>'+pats.map(function(p){return '<option'+(p===cv?' selected':'')+'>'+p+'</option>';}).join('');}
function renderTbl(){var fpv=(document.getElementById('fp-p')||{}).value||'',fvv=(document.getElementById('fp-v')||{}).value||'';var rows=[];DB.jornadas.forEach(function(j){if(fpv&&j.pat!==fpv)return;if(!j.vueltas.length&&!fvv){rows.push({j:j,v:null});return;}j.vueltas.forEach(function(v){if(!fvv||String(v.num)===fvv)rows.push({j:j,v:v});});});rows.sort(function(a,b){return (b.j.id||0)-(a.j.id||0);});var tb=document.getElementById('tbl-body'),em=document.getElementById('tbl-empty');if(!rows.length){if(tb)tb.innerHTML='';if(em)em.style.display='block';return;}if(em)em.style.display='none';var bc=['','bv1','bv2','bv3'];tb.innerHTML=rows.map(function(r,ri){var j=r.j,v=r.v;if(!v)return '<tr><td>'+j.fecha+'</td><td style="font-weight:500">'+j.pat+'</td><td>'+j.cond+'</td><td>'+j.ayu+'</td><td colspan="10" style="color:#888;font-size:11px">Sin vueltas</td></tr>';var inc=v.ds==='si'||v.de==='si'||v.rc==='si';return '<tr><td>'+j.fecha+'</td><td style="font-weight:500">'+j.pat+'</td><td>'+j.cond+'</td><td>'+j.ayu+'</td><td><span class="badge '+(bc[v.num]||'bv1')+"'>'+v.num+'ª</span></td><td style="max-width:120px;overflow:hidden;text-overflow:ellipsis" title="'+v.sucs+'">'+v.sucs+'</td><td>'+(v.ayu2||'—')+'</td><td>'+(v.hsal||'—')+'</td><td>'+(v.hllg||'—')+'</td><td>'+(v.kmrec?v.kmrec.toLocaleString('es-CL')+' km':'—')+'</td><td>'+(v.ds==='si'?'<span class="badge bdmg">Sí</span>':'<span style="color:#888">No</span>')+'</td><td>'+(v.de==='si'?'<span class="badge bdmg">Sí</span>':'<span style="color:#888">No</span>')+'</td><td>'+(v.rc==='si'?'<span class="badge bdmg">Sí</span>':'<span style="color:#888">No</span>')+'</td><td>'+(inc?'<button class="exp-btn" style="padding:3px 8px;font-size:11px" onclick="togInc(this,'+ri+')">Ver</button>':'')+'</td></tr>'+(inc?'<tr id="inc-'+ri+'" style="display:none"><td colspan="14" style="padding:6px 10px;background:#FFFBF5">'+buildInc(v)+'</td></tr>':''')).join('');}
function buildInc(v){var h='<div style="display:flex;flex-wrap:wrap;gap:8px;padding:4px 0">';if(v.ds==='si')h+='<div class="inc-detail"><span class="il">Daño al recibir</span>'+v.dscmt+'</div>';if(v.de==='si')h+='<div class="inc-detail"><span class="il">Daño en entrega</span>'+v.decmt+'</div>';if(v.rc==='si')h+='<div class="inc-detail"><span class="il">Reclamo</span>'+v.rccmt+'</div>';return h+'<div style="font-size:11px;color:#888;width:100%;margin-top:2px">Actualizado: '+(v.updatedAt||'—')+'</div></div>';}
function togInc(btn,ri){var r=document.getElementById('inc-'+ri);if(!r)return;var s=r.style.display==='none';r.style.display=s?'table-row':'none';btn.textContent=s?'Cerrar':'Ver';}
function expCSV(){if(!DB.jornadas.length){alert('Sin registros.');return;}var hdr='Fecha,Patente,Conductor,Ay.Jornada,Vuelta,Sucursales,Ay2.Vuelta,H.sal,H.llg,Km sal,Km llg,Km rec,Daño sal,Det daño sal,Daño ent,Det daño ent,Reclamo,Det reclamo,Obs,Actualizado';var rows=[];DB.jornadas.forEach(function(j){j.vueltas.forEach(function(v){rows.push([j.fecha,j.pat,j.cond,j.ayu,v.num,'"'+v.sucs+'"',v.ayu2||'',v.hsal,v.hllg,v.kmsal||'',v.kmllg||'',v.kmrec||'',v.ds,'"'+( v.dscmt||'')+'"',v.de,'"'+( v.decmt||'')+'"',v.rc,'"'+( v.rccmt||'')+'"','"'+( v.obs||'')+'"',v.updatedAt||'']).join(','));});});var a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+hdr+'\n'+rows.join('\n')],{type:'text/csv;charset=utf-8'}));a.download='vueltas.csv';a.click();}
function renderAdmin(){var uR=DB.usuarios.map(function(u,i){var pb=u.permisos.map(function(p){return '<span class="badge bact" style="font-size:10px;margin-right:2px">'+p+'</span>';}).join('');return '<div class="ir" id="ir-u-'+i+'"><div><div>'+u.nombre+(u.mustChangePIN?'<span class="badge bwrn" style="font-size:10px;margin-left:4px">PIN temp.</span>':'')+'</div><div class="ir-sub">'+u.rol+' · '+pb+'</div></div><button class="del-btn" onclick="askDelU('+i+')">Eliminar</button></div>';}).join('');var pR=DB.patentes.map(function(v,i){return '<div class="ir" id="ir-p-'+i+'"><span>'+v+'</span><button class="del-btn" onclick="askDelP('+i+')">Eliminar</button></div>';}).join('');var sR=DB.sucursales.map(function(s){return '<div class="ir" id="ir-s-'+s.n+'"><div><div>Suc. '+s.n+'</div><div class="ir-sub">'+s.addr+'</div></div><button class="del-btn" onclick="askDelS('+s.n+')">Eliminar</button></div>';}).join('');document.getElementById('v-admin').innerHTML='<div class="pad"><div class="adm-sec"><div class="lbl t0">Usuarios</div><div class="card"><div class="field"><label>Nombre</label><input id="nu-n" placeholder="Nombre completo"></div><div class="field"><label>Rol</label><select id="nu-r"><option value="conductor">Conductor</option><option value="ayudante">Ayudante</option><option value="admin">Administrador</option></select></div><div class="field"><label>PIN temporal</label><input id="nu-p" type="password" maxlength="4" inputmode="numeric" placeholder="••••"></div><div class="field"><label>Módulos autorizados</label><div class="perm-row"><label class="perm-cb"><input type="checkbox" id="pm-j" checked> Jornada</label><label class="perm-cb"><input type="checkbox" id="pm-r"> Registros</label><label class="perm-cb"><input type="checkbox" id="pm-a"> Administrar</label></div></div><button class="btn btn-p" style="margin-top:8px" onclick="addU()">Agregar usuario</button></div><div class="il-list"><div class="ir" style="opacity:.5"><div><div>Maestro</div><div class="ir-sub">admin · todos los módulos</div></div><span style="font-size:11px;color:#888">usuario fijo</span></div>'+(uR||'<div class="empty-msg">Sin usuarios</div>')+'</div>'+ uplB('usr-xls')+'</div><div class="adm-sec"><div class="lbl">Patentes</div><div class="adm-r"><input id="np" placeholder="Ej: ABCD12"><button class="add-btn" onclick="addP()">+</button></div>'+ uplB('pat-xls')+'<div class="il-list">'+(pR||'<div class="empty-msg">Sin patentes</div>')+'</div></div><div class="adm-sec"><div class="lbl">Sucursales</div><div class="adm-r"><input id="ns-n" type="number" placeholder="N°" style="flex:0 0 68px" inputmode="numeric"><input id="ns-a" placeholder="Dirección"><button class="add-btn" onclick="addS()">+</button></div><div class="adm-r" style="margin-bottom:6px"><input placeholder="Buscar sucursal..." oninput="filtS(this.value)" style="flex:1"></div>'+ uplB('suc-xls')+'<div id="suc-list" class="il-list">'+(sR||'<div class="empty-msg">Sin sucursales</div>')+'</div></div><div style="height:1rem"></div></div>';}
function uplB(id){return '<div class="ub" onclick="loadX(function(){document.getElementById(\''+id+'\').click()})"><p>Subir archivo .xlsx</p><span class="tpl-btn" onclick="event.stopPropagation();loadX(function(){dlT(\''+id+'\')})">Descargar plantilla</span><input id="'+id+'" type="file" accept=".xlsx,.xls" style="display:none" onchange="hXLS(\''+id+'\',this)"></div><div id="ur-'+id+'" class="ur"></div>';}
function loadX(cb){if(typeof XLSX!=='undefined'){cb();return;}var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=cb;document.head.appendChild(s);}
function dlT(id){if(typeof XLSX==='undefined'){alert('Cargando, intenta de nuevo.');return;}var ws,wb=XLSX.utils.book_new();if(id==='usr-xls')ws=XLSX.utils.aoa_to_sheet([['Nombre','Rol','PIN','Permisos'],['Juan Pérez','conductor','1234','jornada']]);else if(id==='pat-xls')ws=XLSX.utils.aoa_to_sheet([['Patente'],['ABCD12']]);else ws=XLSX.utils.aoa_to_sheet([['Numero','Direccion'],[1,'Av. Ejemplo 123']]);XLSX.utils.book_append_sheet(wb,ws,'Datos');XLSX.writeFile(wb,id.replace('-xls','')+'.xlsx');}
function hXLS(id,inp){var file=inp.files[0];if(!file)return;var res=document.getElementById('ur-'+id);loadX(function(){var reader=new FileReader();reader.onload=function(e){try{var wb=XLSX.read(e.target.result,{type:'array'});var rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});var count=0;if(id==='usr-xls'){rows.forEach(function(r){var n=String(r['Nombre']||''). trim(),rol=String(r['Rol']||'conductor').trim(),p=String(r['PIN']||''). trim(),pm=String(r['Permisos']||'jornada').split(',').map(function(x){return x.trim();});if(n&&p&&!DB.usuarios.find(function(x){return x.nombre===n;})){DB.usuarios.push({id:'u'+Date.now()+'x'+count,nombre:n,rol:rol,pin:p,mustChangePIN:true,permisos:pm});count++;}});}else if(id==='pat-xls'){rows.forEach(function(r){var v=String(r['Patente']||''). trim().toUpperCase();if(v&&DB.patentes.indexOf(v)<0){DB.patentes.push(v);count++;}});}else{rows.forEach(function(r){var n=parseInt(r['Numero']||0),a=String(r['Direccion']||''). trim();if(n&&a&&!DB.sucursales.find(function(s){return s.n===n;})){DB.sucursales.push({n:n,addr:a});count++;}});DB.sucursales.sort(function(a,b){return a.n-b.n;});}dbS();res.className='ur ok';res.textContent=count+' registros importados.';inp.value='';setTimeout(renderAdmin,300);}catch(err){res.className='ur err';res.textContent='Error al leer el archivo.';}};reader.readAsArrayBuffer(file);});}
function askDelU(i){var r=document.getElementById('ir-u-'+i);if(r)askDel(r,function(){DB.usuarios.splice(i,1);dbS();renderAdmin();});}
function askDelP(i){var r=document.getElementById('ir-p-'+i);if(r)askDel(r,function(){DB.patentes.splice(i,1);dbS();renderAdmin();});}
function askDelS(n){var r=document.getElementById('ir-s-'+n);if(r)askDel(r,function(){DB.sucursales=DB.sucursales.filter(function(s){return s.n!==n;});dbS();renderAdmin();});}
function addU(){var n=document.getElementById('nu-n').value.trim(),r=document.getElementById('nu-r').value,p=document.getElementById('nu-p').value.trim();if(!n||!p){alert('Completa nombre y PIN.');return;}if(!/^\d{4}$/.test(p)){alert('El PIN debe ser 4 dígitos.');return;}if(allU().find(function(u){return u.nombre===n;})){alert('Ya existe ese usuario.');return;}var perms=[];if(document.getElementById('pm-j').checked)perms.push('jornada');if(document.getElementById('pm-r').checked)perms.push('registros');if(document.getElementById('pm-a').checked)perms.push('admin');if(!perms.length){alert('Selecciona al menos un módulo.');return;}DB.usuarios.push({id:'u'+Date.now(),nombre:n,rol:r,pin:p,mustChangePIN:true,permisos:perms});dbS();renderAdmin();}
function addP(){var v=document.getElementById('np').value.trim().toUpperCase();if(!v)return;if(DB.patentes.indexOf(v)<0)DB.patentes.push(v);document.getElementById('np').value='';dbS();renderAdmin();}
function addS(){var n=parseInt(document.getElementById('ns-n').value),a=document.getElementById('ns-a').value.trim();if(!n||!a){alert('Ingresa número y dirección.');return;}if(DB.sucursales.find(function(s){return s.n===n;})){alert('Ya existe.');return;}DB.sucursales.push({n:n,addr:a});DB.sucursales.sort(function(a,b){return a.n-b.n;});document.getElementById('ns-n').value='';document.getElementById('ns-a').value='';dbS();renderAdmin();}
function filtS(q){var el=document.getElementById('suc-list');if(!el)return;var q2=q.toLowerCase(),items=DB.sucursales.filter(function(s){return !q2||String(s.n).indexOf(q2)>=0||s.addr.toLowerCase().indexOf(q2.toLowerCase())>=0;});el.innerHTML=items.map(function(s){return '<div class="ir" id="ir-s-'+s.n+'"><div><div>Suc. '+s.n+'</div><div class="ir-sub">'+s.addr+'</div></div><button class="del-btn" onclick="askDelS('+s.n+')">Eliminar</button></div>';}).join('')||'<div class="empty-msg">Sin resultados</div>';}
</script>
</body>
</html>
